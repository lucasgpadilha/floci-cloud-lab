apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: floci-cloud-lab-app
  namespace: floci-cloud-lab
  labels:
    app.kubernetes.io/name: floci-cloud-lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: floci-cloud-lab-app
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
